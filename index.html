<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reminder PRO MAX ULTRA</title>

<style>
/* 🔥 GLOBAL */
*{
box-sizing:border-box;
transition:all 0.25s ease;
}

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
overflow-x:hidden;
transition:0.3s;
}

/* LIGHT MODE */
.light{
background:linear-gradient(135deg,#f8fafc,#e2e8f0);
color:#0f172a;
}

/* CONTAINER */
.container{
max-width:420px;
margin:auto;
padding:15px;
padding-bottom:90px;
overflow:hidden;
animation:fadeIn 0.4s ease;
}

/* FADE ANIMATION */
@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* GLASS BOX */
.box{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
padding:15px;
border-radius:15px;
margin-bottom:12px;
}
.light .box{
background:white;
border:1px solid #e2e8f0;
}

/* INPUT */
input,select,button{
width:100%;
padding:12px;
margin:6px 0;
border-radius:12px;
border:none;
box-sizing:border-box;
}
input, select{
background:rgba(255,255,255,0.1);
color:white;
border:1px solid rgba(255,255,255,0.2);
}

.light input, .light select{
background:#e2e8f0;
color:#0f172a;
border:1px solid #cbd5e1;
}

input::placeholder{
color:#94a3b8;
}
/* FOCUS GLOW */
input:focus,select:focus{
outline:none;
border:2px solid #22c55e;
box-shadow:0 0 10px #22c55e55;
}

/* BUTTON */
button{
cursor:pointer;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
font-weight:bold;
}

button:hover{
box-shadow:0 0 15px #22c55e88;
}

button:active{
transform:scale(0.92);
}

/* CARD */
.card{
padding:14px;
border-radius:14px;
margin-top:10px;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
border:1px solid rgba(255,255,255,0.08);
animation:popIn 0.3s ease;
}

@keyframes popIn{
from{transform:scale(0.9);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.card:active{
transform:scale(0.97);
}

/* PRIORITY */
.high{background:#dc2626;}
.medium{background:#f59e0b;}
.low{background:#16a34a;}

/* CATEGORY COLORS */
.birthday{background:#f472b6;}
.anniversary{background:#fb7185;}
.gym{background:#22c55e;}
.water{background:#06b6d4;}
.running{background:#f97316;}
.walking{background:#84cc16;}
.reading{background:#6366f1;}
.sleeping{background:#64748b;}
.wakeup{background:#10b981;}
.food{background:#f59e0b;}
.other{background:#94a3b8;}

/* TABS */
.tabs{
display:flex;
gap:6px;
margin-bottom:10px;
}

.tabs button{
flex:1;
background:#334155;
color:white;
position:relative;
overflow:hidden;
}

.tabs .active{
background:#22c55e;
}

.tabs button::after{
content:"";
position:absolute;
bottom:0;
left:0;
width:0%;
height:3px;
background:#22c55e;
transition:0.3s;
}

.tabs .active::after{
width:100%;
}

/* CALENDAR */
#calendarHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

#calendarGrid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

/* DAY BOX */
.day{
padding:10px;
border-radius:10px;
text-align:center;
font-weight:500;
cursor:pointer;
transition:0.3s;
transform:scale(1.1);

/* DARK MODE */
background:rgba(255,255,255,0.08);
color:#e2e8f0;

border:1px solid rgba(255,255,255,0.08);
}

/* LIGHT MODE */
.light .day{
background:#e2e8f0;
color:#0f172a;
border:1px solid #cbd5e1;
}

/* TOUCH EFFECT */
.day:active{
transform:scale(0.85);
}

/* SELECTED DATE */
.selected{
background:#22c55e !important;
color:white !important;
box-shadow:0 0 12px #22c55e88;
}

/* EVENT DAY (VERY IMPORTANT) */
.hasEvent{
background:#06b6d4 !important;
color:white !important;
box-shadow:0 0 10px #06b6d488;
}

/* BOTH (SELECTED + EVENT) */
.selected.hasEvent{
background:linear-gradient(135deg,#22c55e,#06b6d4) !important;
}

/* NAV */
#nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
padding:10px 0;
border-top:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
background:rgba(15,23,42,0.8);
}

.light #nav{background:white;}

#nav button{
background:none;
color:white;
font-size:20px;
}

.light #nav button{color:black;}

#nav button:active{
transform:scale(1.2);
}

.activeNav{
color:#22c55e;
}

/* POPUP */
#popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

#popup div{
background:white;
color:black;
padding:20px;
border-radius:12px;
width:90%;
animation:fadeIn 0.3s ease;
}
/* DARK MODE POPUP */
body:not(.light) #popup div{
background:#1e293b;
color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>🚀 Reminder PRO MAX ULTRA</h2>

<div id="homePage">

<div class="tabs">
<button id="t1" onclick="setTab('today')">Today</button>
<button id="t2" onclick="setTab('upcoming')">Upcoming</button>
<button id="t3" onclick="setTab('done')">Done</button>
</div>

<div class="box">
<input id="search" placeholder="Search">
<div id="progressBox"></div>
</div>

<div class="box">
<div id="calendarHeader"></div>
<div id="calendarGrid"></div>
<button onclick="clearFilter()">Clear Filter</button>
</div>

<div id="list"></div>

</div>

<div id="addPage" style="display:none;">
<div class="box">

<label>Quick Event</label>
<select id="quick" onchange="applyTemplate(this.value)">
<option value="">Select</option>
<option value="birthday">Birthday</option>
<option value="anniversary">Anniversary</option>
<option value="gym">Gym</option>
<option value="water">Water</option>
<option value="running">Running</option>
<option value="walking">Walking</option>
<option value="reading">Reading</option>
<option value="sleeping">Sleeping</option>
<option value="wakeup">Wake Up</option>
<option value="food">Food</option>
<option value="other">Other</option>
</select>

<label>Event Name</label>
<input id="text" placeholder="Event">
<label>Time</label>
<input type="time" id="time">
<label>Date</label>
<input type="date" id="date">

<label>Repeat Event</label>
<select id="repeat" onchange="toggleHourly()">
<option value="once">Once</option>
<option value="daily">Daily</option>
<option value="weekly">Weekly</option>
<option value="monthly">Monthly</option>
<option value="yearly">Yearly</option>
<option value="hourly">Hourly</option>
</select>

<input id="hours" type="number" placeholder="Hours" style="display:none;">

<label>Priority</label>
<select id="priority">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>
<label>Category</label>
<select id="category">
  <option value="">Select</option>
<option value="birthday">Birthday</option>
<option value="anniversary">Anniversary</option>
<option value="gym">Gym</option>
<option value="water">Water</option>
<option value="running">Running</option>
<option value="walking">Walking</option>
<option value="reading">Reading</option>
<option value="sleeping">Sleeping</option>
<option value="wakeup">Wake Up</option>
<option value="food">Food</option>
<option value="other">Other</option>
</select>

<button onclick="add()">Add Event</button>
<button onclick="clearAdd()">Clear</button>

</div>
</div>

<div id="settingsPage" style="display:none;">
<div class="box">
<button onclick="enableNotification()">🔔 Enable Notification</button>
<button onclick="toggleTheme()">🌗 Toggle Theme</button>
<button onclick="exportData()">📤 Export</button>
<input type="file" onchange="importData(event)">
</div>
</div>

</div>

<div id="nav">
<button id="n1" onclick="showPage('home')">🏠</button>
<button id="n2" onclick="showPage('add')">➕</button>
<button id="n3" onclick="showPage('settings')">⚙️</button>
</div>

<div id="popup">
<div>
<h3>Edit</h3>
<input id="eText">
<input type="time" id="eTime">
<input type="date" id="eDate">
<select id="eRepeat"></select>
<select id="ePriority"></select>
<select id="eCategory"></select>
<button onclick="saveEdit()">Save</button>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<audio id="sound" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

<script>

let data=JSON.parse(localStorage.getItem("data"))||[];
let tab="today";
let editId=null;
let current=new Date();
let selectedDate=null;

// ---------- PAGE ----------
function showPage(p){
homePage.style.display="none";
addPage.style.display="none";
settingsPage.style.display="none";

n1.classList.remove("activeNav");
n2.classList.remove("activeNav");
n3.classList.remove("activeNav");

if(p==="home"){homePage.style.display="block";n1.classList.add("activeNav");}
if(p==="add"){addPage.style.display="block";n2.classList.add("activeNav");}
if(p==="settings"){settingsPage.style.display="block";n3.classList.add("activeNav");}
}

// ---------- SMART ----------
function smartSuggest(){
let now=new Date().getHours();

if(now<9) alert("Morning routine add karo ☀️");
if(now>=9 && now<18) alert("Work tasks add karo 💼");
if(now>=18) alert("Health / gym reminder add karo 🏃");
}

function autoSchedule(text){

if(text.toLowerCase().includes("gym")){
time.value="07:00";
repeat.value="daily";
}

if(text.toLowerCase().includes("sleep")){
time.value="23:00";
}

}

// ---------- HABIT ----------
function addHabit(name){
data.push({
id:Date.now(),
text:name,
date:format(new Date()),
time:"09:00",
repeat:"daily",
priority:"low",
category:"habit",
completed:false,
next:new Date().getTime()
});
save();
}

function getProgress(){
let done=data.filter(x=>x.completed).length;
let total=data.length;
return Math.round((done/total)*100)||0;
}

// ---------- SWIPE ----------
let startX=0;

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

document.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;

if(endX-startX>80) showPage("home");
if(startX-endX>80) showPage("add");
});

// ---------- TAB ----------
function setTab(t){
tab=t;
t1.classList.remove("active");
t2.classList.remove("active");
t3.classList.remove("active");

if(t==="today") t1.classList.add("active");
if(t==="upcoming") t2.classList.add("active");
if(t==="done") t3.classList.add("active");

render();
}

// ---------- THEME ----------
function toggleTheme(){document.body.classList.toggle("light");}

// ---------- FORMAT ----------
function format(d){
return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');
}

function formatDisplay(dateStr){
return new Date(dateStr).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}

// ---------- TEMPLATE ----------
function applyTemplate(type){

let templates={
birthday:{time:"00:00",repeat:"yearly"},
anniversary:{time:"00:00",repeat:"yearly"},
gym:{time:"07:00",repeat:"daily"},
water:{time:"09:00",repeat:"hourly"},
running:{time:"06:00",repeat:"daily"},
walking:{time:"18:00",repeat:"daily"},
reading:{time:"21:00",repeat:"daily"},
sleeping:{time:"23:00",repeat:"daily"},
wakeup:{time:"06:00",repeat:"daily"},
food:{time:"13:00",repeat:"daily"},
other:{time:"12:00",repeat:"once"}
};

let t=templates[type];
if(!t) return;

time.value=t.time;
repeat.value=t.repeat;
category.value=type;
}

// ---------- ADD ----------
function add(){

let quickVal=document.getElementById("quick").value;

if(quickVal){
category.value=quickVal;
}

if(!text.value||!date.value||!time.value){
alert("Fill all");return;
}

data.push({
id:Date.now(),
text:text.value,
date:date.value,
time:time.value,
repeat:repeat.value,
priority:priority.value,
category:category.value,
hours:parseInt(hours.value)||1,
before:0,
warned:false,
completed:false,
next:new Date(date.value+"T"+time.value).getTime()
});

save();
showPage("home");
}

function clearAdd(){
text.value=""; time.value=""; date.value="";
}

// ---------- SAVE ----------
function save(){
localStorage.setItem("data",JSON.stringify(data));
render();
}

// ---------- SOUND ----------
function playSound(){sound.play().catch(()=>{});}
function vibrate(){if(navigator.vibrate) navigator.vibrate([200,100,200]);}

// ---------- EDIT ----------
function edit(id){
let r=data.find(x=>x.id===id);
editId=id;
eText.value=r.text;
eDate.value=r.date;
eTime.value=r.time;
popup.style.display="flex";
}

function saveEdit(){
let r=data.find(x=>x.id===editId);
r.text=eText.value;
r.date=eDate.value;
r.time=eTime.value;
r.next=new Date(r.date+"T"+r.time).getTime();
save();
closePopup();
}

function closePopup(){popup.style.display="none";}

// ---------- DELETE ----------
function del(id){
data=data.filter(x=>x.id!==id);
save();
}

// ---------- COMPLETE ----------
function complete(id){
let r=data.find(x=>x.id===id);

if(r.repeat==="once"){
r.completed=true;
}else{
let d=new Date(r.next);

if(r.repeat==="daily") d.setDate(d.getDate()+1);
if(r.repeat==="weekly") d.setDate(d.getDate()+7);
if(r.repeat==="monthly") d.setMonth(d.getMonth()+1);
if(r.repeat==="yearly") d.setFullYear(d.getFullYear()+1);
if(r.repeat==="hourly") d.setHours(d.getHours()+r.hours);

r.next=d.getTime();
r.date=format(d);
r.time=d.toTimeString().slice(0,5);
}

save();
}

// ---------- COUNTDOWN ----------
function getCountdown(ms){
let s=Math.floor(ms/1000);
let d=Math.floor(s/86400);s%=86400;
let h=Math.floor(s/3600);s%=3600;
let m=Math.floor(s/60);
let sec=s%60;
return `${d}d ${h}h ${m}m ${sec}s`;
}

// ---------- RENDER ----------
function render(){
list.innerHTML="";
let now=Date.now();
let today=format(new Date());

data.sort((a,b)=>a.next-b.next);

data.forEach(r=>{

if(search.value && !r.text.toLowerCase().includes(search.value.toLowerCase())) return;
if(selectedDate && r.date!==selectedDate) return;

let rDate=new Date(r.date);

if(tab==="today" && !(r.date===today && !r.completed)) return;
if(tab==="upcoming" && (r.completed || rDate.getMonth()!=current.getMonth())) return;
if(tab==="done" && !r.completed) return;

let left=getCountdown(Math.max(0,r.next-now));

list.innerHTML+=`
<div class="card ${r.priority} ${r.category.toLowerCase()}" data-id="${r.id}">
<b>${r.text}</b><br>
📅 ${formatDisplay(r.date)} ⏰ ${r.time}<br>
⏳ <span class="timeLeft">${left}</span><br>

<div style="display:flex;gap:5px;flex-wrap:wrap;">
<button onclick="complete(${r.id})">✔</button>
<button onclick="edit(${r.id})">✏</button>
<button onclick="del(${r.id})">❌</button>
<button onclick="snooze(${r.id},5)">⏰+5</button>
<button onclick="snooze(${r.id},10)">⏰+10</button>
</div>
</div>`;
});

calendar();
progressBox.innerText="Progress: "+getProgress()+"%";
}

// ---------- COUNTDOWN UPDATE ----------
function updateCountdownOnly(){
let now=Date.now();

document.querySelectorAll(".card").forEach(card=>{
let id=card.getAttribute("data-id");
let r=data.find(x=>x.id==id);
if(!r) return;

let left=getCountdown(Math.max(0,r.next-now));
card.querySelector(".timeLeft").innerText=left;
});
}

// ---------- SNOOZE ----------
function snooze(id,min=5){
let r=data.find(x=>x.id===id);

let d=new Date();
d.setMinutes(d.getMinutes()+min);

r.next=d.getTime();
r.date=format(d);
r.time=d.toTimeString().slice(0,5);

save();
}

// ---------- CALENDAR ----------
function calendar(){
let y=current.getFullYear();
let m=current.getMonth();

calendarHeader.innerHTML=`
<button onclick="prev()">⬅</button>
<b>${new Date(y,m).toLocaleString('default',{month:'long'})} ${y}</b>
<button onclick="next()">➡</button>
`;

calendarGrid.innerHTML="";

let names=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
names.forEach(d=>{
calendarGrid.innerHTML+=`<div style="text-align:center;font-size:12px">${d}</div>`;
});

let first=new Date(y,m,1).getDay();
let days=new Date(y,m+1,0).getDate();

for(let i=0;i<first;i++) calendarGrid.innerHTML+="<div></div>";

for(let d=1;d<=days;d++){
let dateStr=format(new Date(y,m,d));
let hasEvent=data.some(x=>x.date===dateStr && !x.completed);

calendarGrid.innerHTML+=`
<div class="day ${hasEvent?'hasEvent':''} ${selectedDate===dateStr?'selected':''}"
onclick="selectDate('${dateStr}')">${d}</div>`;
}
}

function selectDate(d){selectedDate=d;render();}
function clearFilter(){selectedDate=null;current=new Date();render();}
function prev(){current.setMonth(current.getMonth()-1);render();}
function next(){current.setMonth(current.getMonth()+1);render();}

// ---------- ENGINE (FINAL FIX) ----------
setInterval(()=>{
let now=Date.now();

updateCountdownOnly();

data.forEach(r=>{

// BEFORE ALERT
if(!r.completed && r.before && now >= r.next - (r.before*60000) && !r.warned){
alert("Upcoming: "+r.text);
r.warned=true;
}

// MAIN TRIGGER
if(!r.completed && now>=r.next){

playSound();
vibrate();

if(Notification.permission==="granted"){
new Notification("⏰ Reminder",{body:r.text});
}

alert("Reminder: "+r.text);
complete(r.id);
}

});

},1000);

// ---------- INIT ----------
setTab("today");
showPage("home");
render();
smartSuggest();

</script>

</body>
  </html>
